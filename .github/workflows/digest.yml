name: Generate Daily Dev Digest

on:
  schedule:
    - cron: "30 2 * * *" # 8:00 AM IST — single daily run (throttled from 4x/day)
  workflow_dispatch:

# Least-privilege by default; `id-token: write` is required for AWS OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Daily Dev Digest Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # AWS auth for Bedrock via GitHub OIDC (preferred — no long-lived keys).
      # The IAM role in AWS_ROLE_ARN must trust this repo's OIDC subject and
      # allow bedrock:InvokeModel on the Nova Pro model / inference-profile ARN.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
        # Fallback for static keys (comment out the block above and set
        # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY as env on the step below).

      - name: Generate Digest (scrape -> clean -> dedupe -> Bedrock LLM x2 -> mdx)
        env:
          FEED_SOURCES: ${{ secrets.FEED_SOURCES }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID || 'us.amazon.nova-pro-v1:0' }}
          # Static-key fallback (only used if OIDC step above is disabled):
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_IMAGE_MODEL: ${{ secrets.CF_IMAGE_MODEL || '@cf/black-forest-labs/flux-1-schnell' }}
          # 8 is the documented max for flux-1-schnell; linework and geometric
          # edges are where the extra steps show. Costs $0.00011 per step.
          IMAGE_STEPS: ${{ secrets.IMAGE_STEPS || '8' }}
          IMAGE_REQUIRED: ${{ secrets.IMAGE_REQUIRED || 'false' }}
        run: python generate_digest.py

      # Repointed: push generated .mdx into the portfolio-blog repo (the single
      # source of truth), NOT next-gen-portfolio.
      - name: Clone portfolio-blog Repo
        run: |
          git clone https://x-access-token:${{ secrets.BLOG_REPO_TOKEN }}@github.com/mohansagark/portfolio-blog.git blog

      - name: Ensure posts folder exists
        run: mkdir -p blog/posts/

      - name: Copy MDX files into portfolio-blog/posts
        run: |
          cp -v digests/*.mdx blog/posts/ || echo "⚠️ No .mdx files to copy"

      - name: Copy cover images into portfolio-blog/images
        run: |
          mkdir -p blog/images/
          cp -v digests/images/* blog/images/ 2>/dev/null || echo "ℹ️ No cover images to copy"

      - name: Commit and Push to portfolio-blog
        run: |
          cd blog
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add posts/*.mdx images/ 2>/dev/null || git add posts/*.mdx
          git commit -m "🔁 daily dev digest $(date '+%Y-%m-%d %H:%M')" || echo "⚠️ Nothing to commit"
          git push origin main

      # NOTE: Vercel deploy hook removed. Deployment is now triggered by
      # portfolio-blog's own CI after it rebuilds its generated/ artifacts.
